<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="通过 ISBN 号查询中国图书馆分类号（中图分类号），解析完整中文分类路径">
    <title>ISBN → 中图分类号查询工具</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <!-- 头部 -->
        <header class="header" id="header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                    <line x1="8" y1="7" x2="16" y2="7"/>
                    <line x1="8" y1="11" x2="14" y2="11"/>
                </svg>
                <h1>ISBN → 中图分类号</h1>
            </div>
            <p class="subtitle">输入 ISBN，查询中国图书馆分类号及完整分类路径</p>
        </header>

        <!-- 标签切换 -->
        <nav class="tabs" id="tabs">
            <button class="tab active" data-tab="single" id="tab-single">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                单条查询
            </button>
            <button class="tab" data-tab="batch" id="tab-batch">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="16" y1="13" x2="8" y2="13"/>
                    <line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
                批量查询
            </button>
        </nav>

        <!-- 单条查询面板 -->
        <section class="panel active" id="panel-single">
            <div class="search-box">
                <div class="input-wrapper">
                    <input type="text" id="isbn-input" placeholder="请输入 ISBN 号（支持 ISBN-10 和 ISBN-13）"
                           maxlength="17" autocomplete="off">
                    <button class="btn-search" id="btn-search" onclick="doSingleQuery()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        查询
                    </button>
                </div>
                <div class="input-hint">示例：9787111544937 或 978-7-111-54493-7</div>
            </div>

            <!-- 加载状态 -->
            <div class="loading hidden" id="single-loading">
                <div class="spinner"></div>
                <span>正在查询国家图书馆...</span>
            </div>

            <!-- 查询结果 -->
            <div class="result-card hidden" id="single-result">
                <div class="result-header">
                    <h2 class="result-title" id="result-title"></h2>
                    <span class="result-isbn" id="result-isbn"></span>
                </div>
                <div class="result-grid">
                    <div class="result-item">
                        <label>作者</label>
                        <span id="result-authors"></span>
                    </div>
                    <div class="result-item">
                        <label>出版社</label>
                        <span id="result-publisher"></span>
                    </div>
                    <div class="result-item">
                        <label>出版年</label>
                        <span id="result-pubdate"></span>
                    </div>
                    <div class="result-item">
                        <label>中图分类号</label>
                        <span class="clc-code" id="result-clc-code"></span>
                    </div>
                </div>
                <div class="clc-path-section">
                    <label>分类路径</label>
                    <div class="clc-path" id="result-clc-path"></div>
                </div>
                <div class="subject-section hidden" id="result-subject-section">
                    <label>主题</label>
                    <span id="result-subject"></span>
                </div>
            </div>

            <!-- 错误提示 -->
            <div class="error-card hidden" id="single-error">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/>
                    <line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
                <span id="single-error-msg"></span>
            </div>
        </section>

        <!-- 批量查询面板 -->
        <section class="panel" id="panel-batch">
            <!-- 文件上传区域 -->
            <div class="upload-zone" id="upload-zone">
                <div class="upload-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                </div>
                <p class="upload-title">拖拽文件至此或点击选择文件</p>
                <p class="upload-hint">支持 CSV、Excel (.xlsx)、TXT 格式，每行一个 ISBN，单次最多 30 条</p>
                <input type="file" id="file-input" accept=".csv,.xlsx,.xls,.txt" hidden>
            </div>

            <div style="text-align: center; margin-top: 1rem; margin-bottom: 0.5rem;">
                <a href="{{ url_for('static', filename='批量查询模板.xlsx') }}" download class="template-link" style="color: var(--primary-color, #3b82f6); text-decoration: none; font-size: 0.95rem; display: inline-flex; align-items: center; justify-content: center; transition: opacity 0.2s;" onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 6px;">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    下载批量查询模板（Excel 格式）
                </a>
            </div>

            <!-- 上传的文件信息 -->
            <div class="file-info hidden" id="file-info">
                <div class="file-detail">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                    </svg>
                    <span id="file-name"></span>
                </div>
                <div class="file-actions">
                    <button class="btn-primary" id="btn-batch-query" onclick="doBatchQuery()">开始查询</button>
                    <button class="btn-ghost" onclick="clearFile()">清除</button>
                </div>
            </div>

            <!-- 批量查询进度 -->
            <div class="batch-progress hidden" id="batch-progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <span class="progress-text" id="progress-text">正在查询...</span>
            </div>

            <!-- 批量查询结果 -->
            <div class="batch-results hidden" id="batch-results">
                <div class="batch-summary" id="batch-summary"></div>
                <div class="batch-actions">
                    <button class="btn-primary" onclick="exportResults()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="7 10 12 15 17 10"/>
                            <line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        导出 Excel
                    </button>
                </div>
                <div class="table-wrapper">
                    <table class="result-table" id="result-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>ISBN</th>
                                <th>书名</th>
                                <th>中图分类号</th>
                                <th>分类路径</th>
                                <th>主题</th>
                                <th>状态</th>
                            </tr>
                        </thead>
                        <tbody id="result-table-body"></tbody>
                    </table>
                </div>
            </div>

            <!-- 批量错误 -->
            <div class="error-card hidden" id="batch-error">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/>
                    <line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
                <span id="batch-error-msg"></span>
            </div>
        </section>

        <!-- 页脚 -->
        <footer class="footer">
            <p>数据来源：<a href="http://opac.nlc.cn" target="_blank" rel="noopener">中国国家图书馆</a>
            &nbsp;|&nbsp; 分类标准：《中国图书馆分类法》第五版</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
